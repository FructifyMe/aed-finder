<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <!-- Gradient for pin -->
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E53935;stop-opacity:1" />
    </linearGradient>
    <!-- Gradient for pulse line -->
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#26C6DA;stop-opacity:0.3" />
      <stop offset="40%" style="stop-color:#00ACC1;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E53935;stop-opacity:0.6" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#E53935" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- ── ICON MARK ─────────────────────────────────────────── -->
  <!-- Background pill for icon -->
  <rect x="8" y="20" width="116" height="120" rx="18" ry="18"
        fill="#0D1B2A" opacity="0.04"/>

  <!-- Pulse / EKG line that flows into pin -->
  <!-- Line: flat left → spike up → spike down → spike up (heartbeat) → flows into pin -->
  <polyline
    points="18,90  34,90  42,90  48,52  56,118  62,72  68,90  80,90"
    fill="none"
    stroke="url(#pulseGrad)"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Pin body (teardrop) — the pulse line "arrives" at the pin -->
  <g filter="url(#shadow)">
    <!-- Pin circle top -->
    <circle cx="97" cy="74" r="18" fill="url(#pinGrad)"/>
    <!-- Pin tail -->
    <path d="M 88,86 Q 97,108 97,108 Q 97,108 106,86 Z"
          fill="url(#pinGrad)"/>
    <!-- Pin inner circle (white dot) -->
    <circle cx="97" cy="74" r="7" fill="white" opacity="0.9"/>
    <!-- Small EKG line inside pin dot -->
    <polyline
      points="91,74  94,74  95,70  97,78  99,68  100,74  103,74"
      fill="none"
      stroke="#E53935"
      stroke-width="1.2"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  <!-- Connection dot where pulse meets pin -->
  <circle cx="80" cy="90" r="2.5" fill="#00ACC1" opacity="0.8"/>

  <!-- ── WORDMARK ───────────────────────────────────────────── -->
  <!-- PULSE -->
  <text x="142" y="96"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="38"
        font-weight="900"
        letter-spacing="-0.5"
        fill="#1A2332">PULSE</text>

  <!-- READY — teal accent -->
  <text x="142" y="134"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="38"
        font-weight="900"
        letter-spacing="-0.5"
        fill="#00ACC1">READY</text>

  <!-- Thin rule between wordmark lines -->
  <line x1="142" y1="103" x2="340" y2="103"
        stroke="#E53935" stroke-width="2" opacity="0.7"/>

  <!-- ── TAGLINE ────────────────────────────────────────────── -->
  <text x="142" y="152"
        font-family="'Arial', 'Helvetica Neue', Arial, sans-serif"
        font-size="11"
        font-weight="500"
        letter-spacing="2.5"
        fill="#6B7280"
        text-transform="uppercase">COMMUNITY AED MANAGEMENT</text>

</svg>

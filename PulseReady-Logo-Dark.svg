<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <linearGradient id="pinGradD" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E53935;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pulseGradD" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#26C6DA;stop-opacity:0.35" />
      <stop offset="40%" style="stop-color:#00ACC1;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E53935;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glowD">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadowD">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#E53935" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Pulse / EKG line -->
  <polyline
    points="18,90  34,90  42,90  48,52  56,118  62,72  68,90  80,90"
    fill="none"
    stroke="url(#pulseGradD)"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glowD)"
  />

  <!-- Pin body -->
  <g filter="url(#shadowD)">
    <circle cx="97" cy="74" r="18" fill="url(#pinGradD)"/>
    <path d="M 88,86 Q 97,108 97,108 Q 97,108 106,86 Z" fill="url(#pinGradD)"/>
    <circle cx="97" cy="74" r="7" fill="white" opacity="0.9"/>
    <polyline
      points="91,74  94,74  95,70  97,78  99,68  100,74  103,74"
      fill="none"
      stroke="#E53935"
      stroke-width="1.2"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  <circle cx="80" cy="90" r="2.5" fill="#00ACC1" opacity="0.9"/>

  <!-- PULSE — white on dark -->
  <text x="142" y="96"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="38"
        font-weight="900"
        letter-spacing="-0.5"
        fill="white">PULSE</text>

  <!-- READY — teal -->
  <text x="142" y="134"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="38"
        font-weight="900"
        letter-spacing="-0.5"
        fill="#26C6DA">READY</text>

  <!-- Rule -->
  <line x1="142" y1="103" x2="340" y2="103"
        stroke="#FF6B6B" stroke-width="1.8" opacity="0.8"/>

  <!-- Tagline -->
  <text x="142" y="152"
        font-family="'Arial', 'Helvetica Neue', Arial, sans-serif"
        font-size="11"
        font-weight="500"
        letter-spacing="2.5"
        fill="rgba(255,255,255,0.45)">COMMUNITY AED MANAGEMENT</text>

</svg>
